      - title: Apogee-dev IdP
        content: "An OpenID Connect (OIDC) compliant identity provider built with ASP.NET Core. It is designed to handle user authentication and provide identity services for other applications."
        image: /images/projects/apogee-dev-idp.png
        featured:
          name: Self-hosted Idp
          link: https://idsrv-1.apogee-dev.com/
        badges:
          - "C#"
          - "ASP.NET Core"
          - "OIDC"
          - "Authentication"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/apogeedev.identityprovider

      - title: Home Server Setup
        content: "A collection of Docker Compose configurations for self-hosting various services. It primarily functions as a reverse proxy and an observability stack, featuring services like Traefik, Grafana, OpenTelemetry, Jaeger, and Prometheus for monitoring and distributed tracing."
        image: /images/projects/home-server-setup.png
        badges:
          - "Docker Compose"
          - "Self-Hosting"
          - "Observability"
          - "Monitoring"
          - "Distributed Tracing"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/private-hosting

      - title: "Traefik: Forward Auth Manager"
        content: "A self-hosted management service for Traefik's forward authentication middleware. It provides a simple web UI to dynamically add or remove authorized users, eliminating the need to manually edit configuration files and restart Traefik when updating user access. The application is built with Go, featuring a Progressive Web App (PWA) frontend."
        image: /images/projects/traefik-auth-manager.png
        badges:
          - "Go"
          - "Traefik"
          - "Docker"
          - "go-app (PWA)"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/traefik-auth-manager

      - title: Route53 Updater
        content: "A command-line tool that updates an AWS Route 53 DNS record with the public IP address of the machine it's running on. This is useful for dynamic DNS updates for home servers or other devices with changing IP addresses."
        image: /images/projects/route53-updater-app.png
        badges:
          - "Go"
          - "AWS Route53"
          - "CLI"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/route53updater

      - title: Webhook Test Tool
        content: "A simple web application for testing webhooks. It allows you to receive and inspect webhook payloads sent from other services, which is useful for development and debugging."
        image: /images/projects/webhook-tester-app.png
        featured:
          name: Webhook Test Tool
          link: https://offsite.apogee-dev.com/webhook-tester/
        badges:
          - "ASP.NET Core"
          - "Webhook Testing"
          - "Development"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/hook-testing

      - title: MC Server Configurator
        content: "A command-line tool designed to simplify the management of Minecraft Bedrock servers in Docker. It dynamically configures the `server.properties` file by reading environment variables, which allows for easy version control and replication of server setups directly from a `docker-compose.yml` file."
        image: /images/projects/mc-config-app.png
        badges:
          - "Go"
          - "Docker"
          - "CLI"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/mc-configurator

      - title: Mincraft Server Manager
        content: "A web-based management tool for Minecraft Bedrock dedicated servers running in Docker. It provides a user-friendly web interface to configure, launch, and switch between different Minecraft worlds."
        image: /images/projects/mc-manager-app.png
        badges:
          - "Go"
          - "go-app (PWA)"
          - "Docker"
          - "Minecraft"
        links:
          - icon: fab fa-github
            url: https://github.com/ajaxe/mc-manager

