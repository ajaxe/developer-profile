      - title: Illuminate
        content: "Chrome Extension: Provide a way for an avid reader to bookmark phrases across the Internet."
        image: /images/projects/illuminate-ext.png
        featured:
          name: Illuminate
          link: https://chrome.google.com/webstore/detail/illuminate/fehdmohlaoagebcpgpmhjfbhglnfednk
        badges:
